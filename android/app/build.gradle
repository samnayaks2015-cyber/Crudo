plugins {
id 'com.android.application'
}

android {
namespace "com.example.crudo_app"
compileSdk 33

defaultConfig {
    applicationId "com.example.crudo_app"
    minSdk 21
    targetSdk 33
    versionCode 1
    versionName "1.0"
    multiDexEnabled true
}

buildTypes {
    release {
        signingConfig signingConfigs.debug
    }
}

}

dependencies {
implementation 'androidx.multidex:multidex:2.0.1'
}
