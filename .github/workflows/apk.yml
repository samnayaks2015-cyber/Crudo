name: Build Flutter APK

on:
push:
branches:
- main

jobs:
build-apk:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Install Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: "3.22.0"

  - name: Install dependencies
    run: flutter pub get

  - name: Build APK
    run: flutter build apk --release
