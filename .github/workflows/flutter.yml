name: Flutter APK Build

on: [push]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v3

  - uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.22.0'

  - name: Install packages
    run: flutter pub get

  - name: Build APK
    run: flutter build apk --release
