name: crudo
description: CRUDO Fresh Milk Delivery App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Banner slider
  carousel_slider: ^4.2.1

  # Page indicator dots
  smooth_page_indicator: ^1.1.0

  # Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:

  uses-material-design: true

  assets:
    - assets/images/banner1.png
    - assets/images/banner2.png
    - assets/images/banner3.png
    - assets/images/milk.png
    - assets/images/buffalo.png
    - assets/images/fruits.png
    - assets/images/vegetables.png
    - assets/images/dairy.png
    - assets/images/crudo_logo.png
    - assets/images/crudo_splash.png
